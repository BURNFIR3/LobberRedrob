# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Our approach uses a robust two-stage pipeline. Stage 1 (precompute.py) applies strict rule-based hard filters across all candidates to immediately disqualify fabricated honeypot profiles, out-of-scope locations, inactive profiles, and those entirely lacking relevant AI/ML domain keywords in their history. This rapidly reduces the search space without heavy computation. 
  
  Stage 2 (rank.py) generates lightweight semantic embeddings using all-MiniLM-L6-v2 on the surviving shortlist to score candidates against the JD. The baseline semantic score is then adjusted using heuristic modifiers—awarding bonuses for top-tier company experience (e.g., Google, Meta) and high GitHub/recruiter engagement, while penalizing consulting-only backgrounds, mismatched seniority, and prolonged notice periods. This hybrid methodology ensures highly explainable, transparent ranking while maintaining rapid execution times (~5 minutes total on CPU).

